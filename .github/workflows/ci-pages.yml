name: CI and GitHub Pages

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BASE_URL: /net-worth-tracker/
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify dist uses Pages base
        run: grep -q "net-worth-tracker" dist/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      # Re-running this job can leave multiple "github-pages" artifacts in the same run;
      # deploy-pages requires exactly one. See actions/upload-pages-artifact#97.
      - name: Remove stale github-pages artifacts (re-run safety)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' \
          | while read -r id; do
              [ -n "${id}" ] || continue
              gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/${id}"
            done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
